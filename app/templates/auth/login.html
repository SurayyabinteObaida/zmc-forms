<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ZMC Forms</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --zmc-blue: #1F4E79;
      --zmc-blue-light: #2E75B6;
      --zmc-accent: #F0A500;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
    }
    .login-header {
      background: var(--zmc-blue);
      color: #fff;
      padding: 2rem 2rem 1.5rem;
      text-align: center;
    }
    .login-header h4 {
      font-weight: 700;
      margin: 0 0 .5rem;
    }
    .login-header small {
      color: rgba(255,255,255,.7);
      font-size: .85rem;
    }
    .login-body {
      padding: 2rem;
    }
    .form-label {
      font-weight: 600;
      font-size: .85rem;
      color: #374151;
      margin-bottom: .4rem;
    }
    .form-control {
      border: 2px solid #E2E8F0;
      border-radius: 8px;
      padding: .65rem .9rem;
      font-size: .9rem;
      transition: all .2s;
    }
    .form-control:focus {
      border-color: var(--zmc-blue-light);
      box-shadow: 0 0 0 3px rgba(46,117,182,.1);
    }
    .btn-login {
      background: var(--zmc-blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .75rem 1.5rem;
      font-weight: 600;
      font-size: .95rem;
      width: 100%;
      transition: all .2s;
    }
    .btn-login:hover {
      background: var(--zmc-blue-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(31,78,121,.3);
    }
    .alert {
      border-radius: 8px;
      font-size: .85rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <i class="bi bi-layers-half fs-1 mb-2 d-block"></i>
      <h4>ZMC Forms</h4>
      <small>ZM Converters (Pvt.) Ltd.</small>
    </div>
    
    <div class="login-body">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endwith %}
      
      <form method="POST">
        <div class="mb-3">
          <label for="username" class="form-label">
            <i class="bi bi-person-circle me-1"></i>Username
          </label>
          <input type="text" 
                 class="form-control" 
                 id="username" 
                 name="username" 
                 placeholder="Enter username"
                 required 
                 autofocus>
        </div>
        
        <div class="mb-4">
          <label for="password" class="form-label">
            <i class="bi bi-shield-lock me-1"></i>Password
          </label>
          <input type="password" 
                 class="form-control" 
                 id="password" 
                 name="password" 
                 placeholder="Enter password"
                 required>
        </div>
        
        <button type="submit" class="btn btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>
      
      <div class="text-center mt-4">
        <small class="text-muted">
          <i class="bi bi-shield-check text-success me-1"></i>
          Secure production form system
        </small>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
